services:
  db:
    image: postgres:15-alpine
    container_name: vorstu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: university_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d university_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - university_net

  mailhog:
    image: mailhog/mailhog
    container_name: vorstu_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - university_net

  kafka:
    image: apache/kafka:3.9.1
    container_name: vorstu_kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - university_net

  backend:
    build: .
    container_name: vorstu_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/university_db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=admin_password
      - SPRING_MAIL_HOST=mailhog
      - SPRING_MAIL_PORT=1025
      - REGISTRATION_CONFIRM_BASE_URL=http://localhost:8080/api/auth/confirm
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EMAIL_DISPATCH_MODE=kafka
      - EMAIL_SIMULATE_FAILURE_RATE=0.3
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - university_net

networks:
  university_net:
    driver: bridge

volumes:
  pgdata:
