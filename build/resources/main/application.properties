spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/university_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration.access=900000
jwt.expiration.refresh=604800000

registration.token.ttl-hours=24
registration.confirm.base-url=${REGISTRATION_CONFIRM_BASE_URL:http://localhost:8080/api/auth/confirm}

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

email.dispatch.mode=${EMAIL_DISPATCH_MODE:kafka}
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
email.kafka.topic=registration-emails
email.kafka.retry-topic=registration-emails-retry
email.kafka.max-retries=3
email.worker.fixed-delay-ms=10000
email.simulate-failure-rate=${EMAIL_SIMULATE_FAILURE_RATE:0.3}
